<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#a45f47">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%278%27 fill=%27%23a45f47%27/%3E%3C/svg%3E">
  <title>找不到頁面｜暖線拼布工作室</title>
  <style>
    * { box-sizing: border-box; }
    body { display: grid; min-height: 100vh; margin: 0; padding: 30px; place-items: center; color: #2f2b27; background: #f7f1e8; font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; }
    main { width: min(100%, 680px); padding: clamp(38px, 8vw, 80px); text-align: center; background: #fffaf3; border: 1px solid rgba(47,43,39,.16); border-radius: 30px; box-shadow: 0 24px 70px rgba(71,55,43,.13); }
    .code { margin: 0 0 18px; color: #a45f47; font-family: "Noto Serif TC", "PMingLiU", serif; font-size: clamp(4rem, 15vw, 8rem); font-weight: 800; line-height: 1; }
    .label { color: #7e4433; font-size: .76rem; font-weight: 800; letter-spacing: .18em; }
    h1 { margin: 0 0 18px; font-family: "Noto Serif TC", "PMingLiU", serif; font-size: clamp(2rem, 7vw, 3.3rem); line-height: 1.25; }
    p { color: #706a63; line-height: 1.75; }
    a { display: inline-flex; min-height: 50px; align-items: center; justify-content: center; margin-top: 10px; padding: 13px 22px; color: #fff; background: #a45f47; border-radius: 999px; font-weight: 750; text-decoration: none; }
    a:focus-visible { outline: 3px solid #d78262; outline-offset: 4px; }
  </style>
</head>
<body>
  <main>
    <p class="code not-found-code" aria-hidden="true">404</p>
    <p class="label">STITCH NOT FOUND</p>
    <h1>這一針，好像縫到別處了</h1>
    <p>你造訪的頁面不存在，或網址已經變更。可以回到首頁繼續查看課程與作品。</p>
    <a href="https://gavin1424.github.io/warm-thread-patchwork-demo/">回到示範站首頁</a>
  </main>
</body>
</html>
